<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hyperdex Photography — Print Price List</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
:root{
  --black:#0C0C0C;
  --white:#FFFFFF;
  --off:#F8F7F5;
  --g90:#E8E6E2;
  --g70:#B0ADA8;
  --g50:#7A7874;
  --g30:#4A4845;
  --serif:"Playfair Display",Georgia,serif;
  --sans:"Barlow",sans-serif;
  --cond:"Barlow Condensed",sans-serif;
}
body{background:var(--white);color:var(--black);font-family:var(--sans);font-size:15px;line-height:1.6}

nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:16px 56px;background:rgba(255,255,255,0.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--g90)}
.nav-lw{display:flex;align-items:center;gap:14px;text-decoration:none}
.nav-li{height:32px;width:auto}
.nav-br{font-family:var(--cond);font-weight:500;font-size:13px;letter-spacing:.2em;text-transform:uppercase;color:var(--black)}
.nav-links{display:flex;gap:40px;list-style:none}
.nav-links a{font-family:var(--cond);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--g50);text-decoration:none;transition:color .2s}
.nav-links a:hover{color:var(--black)}

.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;position:relative;overflow:hidden;padding:140px 56px 80px;background:var(--off)}
.hbg{position:absolute;inset:0;pointer-events:none}
.hbg::before{content:"";position:absolute;inset:0;background-image:linear-gradient(var(--g90) 1px,transparent 1px);background-size:100% 72px;opacity:.45}
.htl,.hbr{position:absolute;width:44px;height:44px}
.htl{top:96px;left:56px;border-top:2px solid var(--black);border-left:2px solid var(--black)}
.hbr{bottom:76px;right:56px;border-bottom:2px solid var(--black);border-right:2px solid var(--black)}
.hlogo{position:relative;margin-bottom:32px}
.hlogo img{height:66px;width:auto}
.heyebrow{font-family:var(--cond);font-size:11px;font-weight:400;letter-spacing:.28em;text-transform:uppercase;color:var(--g50);position:relative;margin-bottom:20px;display:flex;align-items:center;gap:16px;justify-content:center}
.heyebrow::before,.heyebrow::after{content:"";display:block;width:32px;height:1px;background:var(--g70)}
.htitle{font-family:var(--serif);font-size:clamp(56px,9vw,108px);font-weight:900;line-height:.92;letter-spacing:-.02em;color:var(--black);position:relative;margin-bottom:16px}
.htitle em{font-style:italic;font-weight:400;color:var(--g50)}
.hsub{font-family:var(--cond);font-size:13px;font-weight:400;letter-spacing:.2em;text-transform:uppercase;color:var(--g50);position:relative;margin-bottom:44px}
.htagline{font-family:var(--serif);font-size:17px;font-weight:400;font-style:italic;color:var(--g30);position:relative;max-width:500px;line-height:1.75;margin-bottom:60px}
.hscroll{position:relative;display:flex;flex-direction:column;align-items:center;gap:10px}
.hscroll-line{width:1px;height:52px;background:linear-gradient(to bottom,var(--black),transparent)}
.hscroll-txt{font-family:var(--cond);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--g50)}

.fdivider{width:100%;height:1px;background:var(--g90)}
.sec{padding:88px 56px;max-width:960px;margin:0 auto}
.sec-hd{display:flex;align-items:baseline;gap:20px;margin-bottom:14px}
.sec-num{font-family:var(--cond);font-size:11px;font-weight:400;letter-spacing:.14em;color:var(--g70);flex-shrink:0}
.sec-ttl{font-family:var(--serif);font-size:clamp(34px,4.5vw,52px);font-weight:700;color:var(--black);line-height:1.05}
.sec-ttl em{font-style:italic;font-weight:400;color:var(--g50)}
.sec-rule{flex:1;height:1px;background:var(--g90)}
.sec-desc{font-family:var(--sans);font-size:15px;font-weight:300;line-height:1.8;color:var(--g50);max-width:580px;margin-bottom:52px}

.size-stage{display:flex;align-items:flex-end;gap:20px;padding:52px 36px 36px;border:1px solid var(--g90);background:var(--white);position:relative;margin-bottom:20px}
.si{flex:1;display:flex;flex-direction:column;align-items:center;gap:18px;cursor:pointer;transition:transform .2s}
.si:hover{transform:translateY(-4px)}
.sr{border:1px solid var(--g70);background:var(--off);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;transition:all .25s}
.si:hover .sr,.si.active .sr{border-color:var(--black);border-width:2px;background:#EFEFED}
.srl{font-family:var(--cond);font-weight:700;font-size:15px;color:var(--black);letter-spacing:.05em}
.smm{font-family:var(--cond);font-size:9px;color:var(--g70);letter-spacing:.08em;text-align:center}
.sname{font-family:var(--cond);font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--black)}
.suse{font-family:var(--sans);font-size:12px;font-style:italic;color:var(--g50);text-align:center;line-height:1.4}
.sibar{display:flex;align-items:center;gap:16px;margin-top:4px}
.sibar hr{flex:1;border:none;border-top:1px solid var(--g90)}
#sInfo{font-family:var(--serif);font-size:14px;font-style:italic;color:var(--g50);text-align:center;padding:0 12px}

.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--g90);border:1px solid var(--g90)}
.pc{padding:40px 32px;background:var(--white);position:relative;transition:background .25s}
.pc:hover{background:var(--off)}
.pc.ft{background:var(--off);border-top:3px solid var(--black)}
.pbadge{display:inline-block;font-family:var(--cond);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--black);border:1px solid var(--black);padding:4px 12px;margin-bottom:22px}
.pname{font-family:var(--serif);font-size:26px;font-weight:700;color:var(--black);line-height:1.1;margin-bottom:6px}
.pgsm{font-family:var(--cond);font-size:10px;font-weight:400;letter-spacing:.14em;color:var(--g70);margin-bottom:20px;text-transform:uppercase}
.pdesc{font-family:var(--sans);font-size:14px;font-weight:300;line-height:1.8;color:var(--g50)}
.pline{height:1px;background:var(--g90);margin:22px 0}
.pbest{font-family:var(--cond);font-size:10px;letter-spacing:.08em;color:var(--g70);text-transform:uppercase}

.ptoggle{display:flex;gap:0;margin-bottom:44px;border:1px solid var(--g90);width:fit-content}
.tbtn{font-family:var(--cond);font-size:11px;font-weight:400;letter-spacing:.14em;text-transform:uppercase;padding:11px 34px;border:none;background:transparent;color:var(--g50);cursor:pointer;transition:all .2s}
.tbtn.active{background:var(--black);color:var(--white);font-weight:600}
.ppanel{display:none}
.ppanel.active{display:block}
.ptwrap{border:1px solid var(--g90);overflow:hidden}
.pthd{display:grid;padding:13px 32px;background:var(--black)}
.pthd.c4{grid-template-columns:2.2fr 1fr 1fr 1fr}
.pthd.c2{grid-template-columns:2.2fr 1fr}
.pthc{font-family:var(--cond);font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--white)}
.pthc:not(:first-child){text-align:right}
.ptr{display:grid;padding:22px 32px;border-bottom:1px solid var(--g90);transition:background .2s;position:relative}
.ptr.c4{grid-template-columns:2.2fr 1fr 1fr 1fr}
.ptr.c2{grid-template-columns:2.2fr 1fr}
.ptr:last-child{border-bottom:none}
.ptr:hover{background:var(--off)}
.ptr.pop{background:#F2F1EF}
.ptr.pop::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--black)}
.psl{font-family:var(--cond);font-size:19px;font-weight:700;letter-spacing:.04em;color:var(--black);display:flex;align-items:center;gap:10px;margin-bottom:4px}
.ptag{font-family:var(--cond);font-size:9px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--g50);border:1px solid var(--g70);padding:2px 8px}
.psd{font-family:var(--cond);font-size:11px;font-weight:300;letter-spacing:.08em;color:var(--g70);margin-bottom:2px}
.psu{font-family:var(--sans);font-size:12px;font-style:italic;color:var(--g70)}
.ppr{font-family:var(--serif);font-size:23px;font-weight:400;color:var(--black);text-align:right;align-self:center}
.ptnote{margin-top:18px;font-family:var(--sans);font-size:12px;font-style:italic;color:var(--g70);text-align:center;line-height:1.7}

.fgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:44px}
.fcard{border:1px solid var(--g90);overflow:hidden;transition:border-color .2s,transform .2s}
.fcard:hover{border-color:var(--black);transform:translateY(-4px)}
.fswatch{height:86px}
.finfo{padding:18px 20px;background:var(--white)}
.fname{font-family:var(--cond);font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--black);margin-bottom:4px}
.ftone{font-family:var(--sans);font-size:12px;font-style:italic;color:var(--g70)}
.grow{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:44px}
.gcard{padding:28px 30px;border:1px solid var(--g90);background:var(--white)}
.gtag{font-family:var(--cond);font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--black);margin-bottom:12px}
.gdesc{font-family:var(--sans);font-size:14px;font-weight:300;line-height:1.8;color:var(--g50)}
.igrid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--g90);border:1px solid var(--g90)}
.iitem{background:var(--white);padding:28px}
.iico{font-size:18px;margin-bottom:10px;display:block}
.ittl{font-family:var(--cond);font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--black);margin-bottom:6px}
.idesc{font-family:var(--sans);font-size:13px;font-weight:300;line-height:1.7;color:var(--g70)}

.steps{display:flex;align-items:flex-start;justify-content:center;max-width:720px;margin:0 auto 56px}
.step{flex:1;display:flex;flex-direction:column;align-items:center;text-align:center;padding:0 20px;position:relative}
.step::after{content:"";position:absolute;top:18px;right:-50%;width:100%;height:1px;background:var(--g90)}
.step:last-child::after{display:none}
.stepn{width:36px;height:36px;border:1px solid var(--black);display:flex;align-items:center;justify-content:center;font-family:var(--cond);font-size:13px;color:var(--black);margin-bottom:20px}
.stepttl{font-family:var(--cond);font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--black);margin-bottom:8px}
.stepdesc{font-family:var(--sans);font-size:13px;font-weight:300;font-style:italic;line-height:1.65;color:var(--g50)}
.cta{text-align:center;max-width:500px;margin:0 auto;padding:52px;border:1px solid var(--g90)}
.ctah{font-family:var(--serif);font-size:32px;font-weight:400;font-style:italic;color:var(--black);margin-bottom:14px}
.ctasub{font-family:var(--sans);font-size:15px;font-weight:300;line-height:1.7;color:var(--g50);margin-bottom:28px}
.ctaem{font-family:var(--cond);font-size:12px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--black);text-decoration:none;border-bottom:1px solid var(--black);padding-bottom:3px;transition:opacity .2s}
.ctaem:hover{opacity:.5}

footer{border-top:1px solid var(--g90);padding:28px 56px;display:flex;align-items:center;justify-content:space-between;max-width:960px;margin:0 auto}
.fl{display:flex;align-items:center;gap:12px}
.flogo{height:22px;width:auto;opacity:.35}
.fbrand{font-family:var(--cond);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--g70)}
.fnote{font-family:var(--cond);font-size:10px;letter-spacing:.06em;color:var(--g70)}

.fi{opacity:0;transform:translateY(16px);transition:opacity .6s ease,transform .6s ease}
.fi.vis{opacity:1;transform:none}
@keyframes fDn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:none}}
.hero>*{animation:fDn .75s ease both}
.hero>*:nth-child(1){animation-delay:.05s}
.hero>*:nth-child(2){animation-delay:.18s}
.hero>*:nth-child(3){animation-delay:.32s}
.hero>*:nth-child(4){animation-delay:.46s}
.hero>*:nth-child(5){animation-delay:.6s}
.hero>*:nth-child(6){animation-delay:.74s}
@media(max-width:640px){

  /* ── NAV: hide links, show logo + brand only ── */
  nav{padding:12px 16px}
  .nav-lw{gap:10px}
  .nav-li{height:28px}
  .nav-br{font-size:11px;letter-spacing:.14em}
  .nav-links{display:none}

  /* ── HERO ── */
  .hero{padding:100px 24px 60px}
  .htl{top:72px;left:16px}
  .hbr{bottom:56px;right:16px}
  .hlogo img{height:52px}
  .htitle{font-size:56px}
  .htagline{font-size:15px}

  /* ── SECTIONS ── */
  .sec{padding:56px 20px}
  .sec-ttl{font-size:32px}
  .sec-desc{font-size:14px;margin-bottom:32px}

  /* ── SIZE GUIDE: horizontal scroll ── */
  .size-stage{
    overflow-x:auto;-webkit-overflow-scrolling:touch;
    gap:20px;padding:32px 20px 28px;
    scroll-snap-type:x mandatory;
  }
  .si{min-width:80px;scroll-snap-align:start;flex-shrink:0}
  .sibar{margin-top:8px}
  #sInfo{font-size:13px}

  /* ── PAPER TYPES: single column ── */
  .pgrid{grid-template-columns:1fr}
  .pc{padding:28px 24px}

  /* ── PRICING TOGGLE ── */
  .ptoggle{width:100%}
  .tbtn{flex:1;padding:12px 8px;font-size:11px}

  /* ── PRICE TABLE: hide header, stack each row as card ── */
  .pthd.c4{display:none}
  .ptr.c4{
    grid-template-columns:1fr;
    gap:6px;padding:18px 20px;
  }
  .ptr.c4 .psl{font-size:17px}
  /* each price cell gets a label prefix */
  .ptr.c4>div:not(:first-child){
    display:flex;align-items:center;justify-content:space-between;
    padding:4px 0;border-top:1px solid var(--g90);
  }
  .ptr.c4>div:not(:first-child)::before{
    font-family:var(--cond);font-size:10px;letter-spacing:.08em;
    text-transform:uppercase;color:var(--g70);
  }
  .ptr.c4>div:nth-child(2)::before{content:"Lustre Pro"}
  .ptr.c4>div:nth-child(3)::before{content:"Enhanced Matte"}
  .ptr.c4>div:nth-child(4)::before{content:"Cotton Rag"}
  .ptr.c4 .ppr{text-align:right;font-size:17px}

  /* canvas table: keep 2-col but tighten */
  .pthd.c2{padding:10px 20px}
  .ptr.c2{grid-template-columns:1fr auto;gap:8px;padding:16px 20px}
  .ptr.c2 .ppr{font-size:20px}
  .psl{font-size:16px}
  .ptnote{font-size:11px;padding:0 4px}

  /* ── FRAME FINISHES: 2 columns ── */
  .fgrid{grid-template-columns:1fr 1fr;gap:12px}
  .finish-swatch{height:72px}
  .finfo{padding:14px 14px}
  .fname{font-size:11px}
  .ftone{font-size:11px}

  .grow{grid-template-columns:1fr;gap:12px}

  /* ── INCLUDES: 2 columns ── */
  .igrid{grid-template-columns:1fr 1fr}
  .iitem{padding:20px 16px}
  .ittl{font-size:10px}
  .idesc{font-size:12px}

  /* ── HOW TO ORDER: vertical stack ── */
  .steps{
    flex-direction:column;align-items:flex-start;
    gap:24px;margin-bottom:36px;max-width:100%;
  }
  .step{
    flex-direction:row;text-align:left;
    gap:16px;padding:0;align-items:flex-start;
  }
  .step::after{display:none}
  .stepn{flex-shrink:0;margin-bottom:0;margin-top:2px}
  .stepttl{font-size:12px}
  .stepdesc{font-size:13px}

  /* ── CTA ── */
  .cta{padding:32px 24px}
  .ctah{font-size:24px}
  .ctaem{font-size:11px;word-break:break-all}

  /* ── FOOTER ── */
  footer{flex-direction:column;gap:8px;text-align:center;padding:24px 20px}
  .fl{justify-content:center}
  .fnote{font-size:9px}
}

</head>
<body>

<nav>
  <a href="#" class="nav-lw">
    <span class="nav-br">Hyperdex Photography</span>
  </a>
  <ul class="nav-links">
    <li><a href="#sizes">Sizes</a></li>
    <li><a href="#papers">Paper</a></li>
    <li><a href="#pricing">Pricing</a></li>
    <li><a href="#frames">Frames</a></li>
    <li><a href="#order">Order</a></li>
  </ul>
</nav>

<div class="hero">
  <div class="hbg"></div>
  <div class="htl"></div><div class="hbr"></div>
  <p class="heyebrow">Queenstown, New Zealand</p>
  <h1 class="htitle">Landscape<br><em>Prints</em></h1>
  <p class="hsub">Fine Art Photography &nbsp;&middot;&nbsp; Framed &amp; Delivered</p>
  <p class="htagline">Each print is produced on gallery-grade paper, handframed in Australia, and shipped ready to hang &mdash; anywhere in the country.</p>
  <div class="hscroll"><div class="hscroll-line"></div><span class="hscroll-txt">Scroll to explore</span></div>
</div>

<div class="fdivider"></div>

<!-- 01 SIZES -->
<div class="sec" id="sizes">
  <div class="sec-hd fi"><span class="sec-num">01</span><h2 class="sec-ttl">Size <em>Guide</em></h2><div class="sec-rule"></div></div>
  <p class="sec-desc fi">All sizes shown to scale relative to one another. Click any size to see where it works best.</p>
  <div class="size-stage fi">
    <div class="si" data-info="Perfect for a desk, bedside table, or as part of a small gallery cluster on a hallway wall." onclick="selSize(this)">
      <div class="sr" style="width:46px;height:65px"><span class="srl">A4</span><span class="smm">210&times;297</span></div>
      <div><div class="sname">A4</div><div class="suse">Small accent</div></div>
    </div>
    <div class="si" data-info="The most versatile size. Works in bedrooms, studies and hallways &mdash; elegant without being overwhelming." onclick="selSize(this)">
      <div class="sr" style="width:65px;height:92px"><span class="srl">A3</span><span class="smm">297&times;420</span></div>
      <div><div class="sname">A3</div><div class="suse">Hallway &middot; bedroom</div></div>
    </div>
    <div class="si active" data-info="A commanding presence in a living room or dining space. Our best seller &mdash; stunning without overwhelming the room." onclick="selSize(this)">
      <div class="sr" style="width:92px;height:130px"><span class="srl">A2</span><span class="smm">420&times;594</span></div>
      <div><div class="sname">A2</div><div class="suse">Living room &middot; dining</div></div>
    </div>
    <div class="si" data-info="A bold, unmissable feature wall statement. At this size the Remarkables will genuinely stop people in their tracks." onclick="selSize(this)">
      <div class="sr" style="width:130px;height:184px"><span class="srl">A1</span><span class="smm">594&times;841</span></div>
      <div><div class="sname">A1</div><div class="suse">Feature wall</div></div>
    </div>
    <div class="si" data-info="Grand and dramatic. Designed for large open spaces, commercial interiors, and collectors who want maximum visual impact." onclick="selSize(this)">
      <div class="sr" style="width:184px;height:260px"><span class="srl">A0</span><span class="smm">841&times;1189</span></div>
      <div><div class="sname">A0</div><div class="suse">Grand statement</div></div>
    </div>
  </div>
  <div class="sibar fi"><hr><span id="sInfo">A commanding presence in a living room or dining space. Our best seller &mdash; stunning without overwhelming the room.</span><hr></div>
</div>

<div class="fdivider"></div>

<!-- 02 PAPER -->
<div style="background:var(--off)">
<div class="sec" id="papers">
  <div class="sec-hd fi"><span class="sec-num">02</span><h2 class="sec-ttl">Paper <em>Types</em></h2><div class="sec-rule"></div></div>
  <p class="sec-desc fi">Three gallery-grade options, all printed on a 12-colour Epson pigment printer for exceptional depth, accuracy, and longevity.</p>
  <div class="pgrid fi">
    <div class="pc">
      <div class="pname">Lustre Pro</div>
      <div class="pgsm">270 gsm &middot; Pearl Finish</div>
      <div class="pdesc">Slightly glossy with a subtle pearl-like texture. Vibrant tones and excellent contrast &mdash; the ideal choice for most photography, beautiful in any light.</div>
      <div class="pline"></div>
      <div class="pbest">Best for &mdash; General photography, gifting, everyday display</div>
    </div>
    <div class="pc ft">
      <div class="pbadge">&#9733;&nbsp; Most Popular</div>
      <div class="pname">Enhanced<br>Matte</div>
      <div class="pgsm">230 gsm &middot; Flat Matte</div>
      <div class="pdesc">Rich, luxurious flat matte surface with sharp detail and deep colour. No glare, no reflections &mdash; stunning under gallery lighting or in bright rooms.</div>
      <div class="pline"></div>
      <div class="pbest">Best for &mdash; Collectors, living rooms, gallery display</div>
    </div>

<script>
function selSize(el){
  document.querySelectorAll(".si").forEach(s=>s.classList.remove("active"));
  el.classList.add("active");
  document.getElementById("sInfo").textContent=el.dataset.info;
}
function swP(t,btn){
  document.querySelectorAll(".tbtn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  document.querySelectorAll(".ppanel").forEach(p=>p.classList.remove("active"));
  document.getElementById("pp-"+t).classList.add("active");
}
const obs=new IntersectionObserver(entries=>{
  entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add("vis")});
},{threshold:0.08});
document.querySelectorAll(".fi").forEach(el=>obs.observe(el));
</script>
